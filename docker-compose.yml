version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=math_user
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=math_verse_db
    volumes:
      - math_verse_data:/var/lib/postgresql/data
volumes:
  math_verse_data: